services:
  postgres:
    image: postgres:16-alpine
    container_name: dormitory_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-dormitory_db}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dormitory-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dormitory_redis
    volumes:
      - redis_data:/data
    networks:
      - dormitory-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dormitory_backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-dormitory_db}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dormitory-network
    restart: unless-stopped

  frontend:
    build:
      context: ../dormitory-front
      dockerfile: Dockerfile
    container_name: dormitory_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - dormitory-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  dormitory-network:
    driver: bridge
